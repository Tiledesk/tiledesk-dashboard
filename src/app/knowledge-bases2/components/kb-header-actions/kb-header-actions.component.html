<div class="buttons-div">
  <!-- Export Button -->
  <button
    *ngIf="permissionToExportContents"
    class="btn btn-blu-gray-outline"
    matTooltipClass="kb-custom-mat-tooltip"
    matTooltip="{{ 'KbPage.ExportContents' | translate }}"
    #tooltip="matTooltip"
    matTooltipPosition="below"
    matTooltipHideDelay="100"
    (click)="exportContents.emit()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
      <path
        d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"
      />
    </svg>
  </button>

  <!-- Import Button -->
  <button
    *ngIf="permissionToAddContents"
    class="btn btn-blu-gray-outline"
    matTooltipClass="kb-custom-mat-tooltip"
    matTooltip="{{ 'KbPage.ImportContents' | translate }}"
    #tooltip="matTooltip"
    matTooltipPosition="below"
    matTooltipHideDelay="100"
    (click)="importContents.emit()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
      <path
        d="M440-320v-326L336-542l-56-58 200-200 200 200-56 58-104-104v326h-80ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"
      />
    </svg>
  </button>

  <!-- Delete Button -->
  <button
    id="delete-kb"
    class="btn btn-red"
    [disabled]="!permissionToDelete"
    aria-label="Delete"
    style="text-transform: capitalize;"
    (click)="deleteNamespace.emit()"
  >
    <span *ngIf="selectedNamespaceIsDefault === false">
      {{ 'Delete' | translate }}
    </span>
    <span *ngIf="selectedNamespaceIsDefault === true">
      {{ 'KbPage.DeleteNamespace' | translate }}
    </span>
  </button>
</div>

<!-- TAB SWITCHER START -->
<div class="kb-switch-field">
  <input
    type="radio"
    id="tab-contents"
    name="kb-tab-switch"
    [checked]="selectedTab === 'contents'"
    (change)="onTabChange('contents')"
  />
  <label for="tab-contents">
    <span>{{ 'KbPage.Contents' | translate }}</span>
  </label>
  <input
    type="radio"
    id="tab-unanswered"
    name="kb-tab-switch"
    [checked]="selectedTab === 'unanswered'"
    (change)="onTabChange('unanswered')"
  />
  <label for="tab-unanswered">
    <span>{{ 'KbPage.UnansweredQuestions' | translate }}</span>
  </label>
</div>
<!-- TAB SWITCHER END -->
