<div class="main-content css-create-project">
  <!-- Header always visible -->
  <div class="onb-header">
    <img *ngIf="displayLogoWithText" [src]="companyLogo" class="logo" />
    <img *ngIf="!displayLogoWithText" [src]="companyLogoNoText" class="logo no-text" />
    <div class="close-wizard-page">
      <i *ngIf="!CLOSE_BTN_IS_HIDDEN" class="material-icons close-btn" (click)="goBack()">clear</i>
    </div>
  </div>

  <!-- Loader / error overlay while createPippoChatbot() runs -->
  <section class="onb-overlay">
    <div class="onb-overlay__top">
      <h1 class="title">
        Progetto creato{{ projectName ? (': ' + projectName) : '' }}
      </h1>
      <h4 class="title onb-overlay__subtitle">
        Sto procedendo alla creazione della knowledge base e del chatbot. Potrebbe richiedere qualche secondo.
      </h4>
    </div>

    <div class="onb-overlay__body">
      <div class="onb-overlay__error" *ngIf="creationErrorMessage">
        <div class="onb-overlay__error-text">
            <p>
                {{ creationErrorMessage }}
            </p>
        </div>
        <button type="button" class="btn btn-tdblu-no-boxshadow" (click)="createChatbot()">
          Riprova
        </button>
      </div>
    </div>
  </section>

  <div class="onb-overlay__spinner" *ngIf="DISPLAY_SPINNER">
    <div class="loader">
      <svg class="circular" viewBox="25 25 50 50">
        <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-width="2" stroke-miterlimit="10" />
      </svg>
    </div>
  </div>

</div>
